name: Deploy to Azure

on:
  push:
    branches:
      - master  # ブランチ名が main の場合は main に変更

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'  # Python 3.9 を明示的に指定

    - name: Ensure runtime.txt is present
      run: |
        echo "python-3.9.21" > runtime.txt
        cat runtime.txt  # デバッグのため表示

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'gijiro'  # Azure Web App の名前
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: .

    - name: Restart Web App
      run: |
        az webapp restart --name gijiro --resource-group ai2
