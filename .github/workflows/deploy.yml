name: Deploy to Azure

on:
  push:
    branches:
      - master  # または main に変更

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}  # ここが重要

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set Python Version in Azure
      run: |
        az webapp config set --resource-group ai2 --name gijiro --linux-fx-version "PYTHON|3.9"
        az webapp config appsettings set --resource-group ai2 --name gijiro --settings WEBSITES_PYTHON_VERSION=3.9

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'gijiro'  
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: .

    - name: Restart Azure Web App
      run: |
        az webapp restart --name gijiro --resource-group ai2
