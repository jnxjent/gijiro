<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>議事郎</title>
</head>
<body>
    <h1>議事郎</h1>
    <form method="post" enctype="multipart/form-data">
        <label for="audio_file">音声ファイルをアップロード:</label><br>
        <input type="file" id="audio_file" name="audio_file" accept="audio/*"><br>
        <label for="word_file">Wordファイルをアップロード:</label><br>
        <input type="file" id="word_file" name="word_file" accept=".docx"><br>
        <button type="submit">アップロード</button>
    </form>
</body>
</html>
