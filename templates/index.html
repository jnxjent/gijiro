<!doctype html>
    <html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>議事郎</title>
        <style>
            body {
                font-family: 'Helvetica', sans-serif;
                background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                color: #333;
            }
            .container {
                background: rgba(255, 255, 255, 0.9);
                border-radius: 10px;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                padding: 40px;
                text-align: center;
                max-width: 500px;
                width: 100%;
            }
            h1 {
                margin-bottom: 10px;
                color: #007BFF;
            }
            p {
                margin-top: 0;
                font-size: 14px;
                color: #555;
            }
            input[type="file"] {
                display: block;
                margin: 10px auto;
                padding: 10px;
                border: 1px solid #ddd;
                border-radius: 5px;
            }
            input[type="submit"] {
                background: #007BFF;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 5px;
                cursor: pointer;
                font-size: 16px;
            }
            input[type="submit"]:hover {
                background: #0056b3;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h1>議事郎（α版）</h1>
            <p>音声ファイル(WAV, MP4, MP3)と テンプレート(WORD)をアップロード</p>
            <p>すると、転記されたWORDファイルをダウンロードできるよ！</p>
            <form method="post" enctype="multipart/form-data">
                <input type="file" name="audio_file" accept="audio/*"><br><br>
                <input type="file" name="word_file" accept=".doc, .docx"><br><br>
                <input type="submit" value="アップロード">
            </form>
        </div>
    </body>
    </html>
